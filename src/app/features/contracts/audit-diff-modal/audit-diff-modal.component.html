@if (visible) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-950/80 p-4 backdrop-blur-sm" (click)="close()">
    <div
        class="flex h-[85vh] w-full max-w-7xl flex-col overflow-hidden rounded-2xl border border-gray-700 bg-gray-900 shadow-2xl"
        (click)="$event.stopPropagation()"
    >
        <div class="flex items-center justify-between border-b border-gray-800 px-6 py-4">
            <div>
                <h3 class="text-lg font-bold text-white">{{ title }}</h3>
                <p class="text-sm text-gray-400">Original value on the left, updated value on the right.</p>
            </div>

            <button
                type="button"
                (click)="close()"
                class="rounded-md border border-gray-700 px-3 py-2 text-sm font-semibold text-gray-300 transition hover:bg-gray-800 hover:text-white"
            >
                Close
            </button>
        </div>

        <div class="min-h-0 flex-1 p-4">
            <ngx-monaco-diff-editor
                class="block h-full min-h-[28rem]"
                [options]="diffOptions"
                [originalModel]="originalModel"
                [modifiedModel]="modifiedModel"
            />
        </div>
    </div>
</div>
}
